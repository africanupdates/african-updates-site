<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager — African Updates</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    // Point the Identity widget to the correct Netlify site
    if (window.netlifyIdentity) {
      window.netlifyIdentity.init({
        APIUrl: "https://africanupdates.netlify.app/.netlify/identity"
      });
    }
  </script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Auto-open Identity widget if invite or recovery token is present
    if (window.location.hash && (
      window.location.hash.indexOf('invite_token') > -1 ||
      window.location.hash.indexOf('recovery_token') > -1
    )) {
      window.addEventListener('load', function() {
        if (window.netlifyIdentity) {
          window.netlifyIdentity.open();
        }
      });
    }
  </script>
  <script>
  (function () {
    // ----------------------------------------------------------------
    // Preview styling
    // ----------------------------------------------------------------
    CMS.registerPreviewStyle(
      "https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;500;600&family=Roboto+Condensed:wght@700&display=swap"
    );
    CMS.registerPreviewStyle(
      "body{font-family:'Source Sans 3',system-ui,sans-serif;color:#1a1a1a;line-height:1.7;padding:24px 32px;max-width:760px}" +
      ".au-pv-slug{font-family:'Roboto Condensed',sans-serif;font-size:.8rem;color:#1b3a5c;background:#eef3f8;border:1px solid #d5e2ef;border-radius:3px;padding:6px 10px;margin-bottom:16px;word-break:break-all}" +
      ".au-pv-slug b{color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-right:6px}" +
      ".au-pv-badge{display:inline-block;background:#1b3a5c;color:#fff;font-family:'Roboto Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 10px;border-radius:2px;margin:0 6px 8px 0}" +
      ".au-pv-badge--breaking{background:#b91c1c}.au-pv-badge--draft{background:#d97706}" +
      ".au-pv-title{font-family:'Playfair Display',Georgia,serif;font-size:2.25rem;font-weight:900;line-height:1.15;letter-spacing:-.02em;margin:8px 0 12px}" +
      ".au-pv-meta{font-family:'Roboto Condensed',sans-serif;font-size:.9rem;color:#666;display:flex;gap:16px;flex-wrap:wrap;padding-bottom:16px;margin-bottom:20px;border-bottom:1px solid #e0e0e0}" +
      ".au-pv-meta b{color:#1a1a1a;font-weight:600}" +
      ".au-pv-hero{width:100%;max-height:420px;object-fit:cover;border-radius:4px;margin-bottom:20px;display:block}" +
      ".au-pv-hero--empty{width:100%;height:180px;background:#f5f5f5;border:2px dashed #e0e0e0;border-radius:4px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;color:#999;font-family:'Roboto Condensed',sans-serif;letter-spacing:.05em;text-transform:uppercase;font-size:.85rem}" +
      ".au-pv-body{font-size:1.05rem}" +
      ".au-pv-body h2{font-family:'Playfair Display',serif;font-size:1.5rem;margin-top:1.6em;border-bottom:2px solid #e0e0e0;padding-bottom:.3em}" +
      ".au-pv-body h3{font-family:'Playfair Display',serif;font-size:1.25rem;margin-top:1.4em}" +
      ".au-pv-body img{max-width:100%;border-radius:4px;margin:1em 0}" +
      ".au-pv-body blockquote{border-left:4px solid #1b3a5c;background:#f5f5f5;margin:1.5em 0;padding:12px 20px;font-style:italic}" +
      ".au-pv-body a{color:#1b3a5c;text-decoration:underline}" +
      ".au-pv-tags{margin-top:24px;padding-top:16px;border-top:1px solid #e0e0e0}" +
      ".au-pv-tag{display:inline-block;font-family:'Roboto Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 10px;border:1px solid #e0e0e0;border-radius:99px;color:#666;margin:0 4px 4px 0}"
    );

    // ----------------------------------------------------------------
    // Slug helper — mirrors Decap's slugifier closely enough to preview
    // ----------------------------------------------------------------
    function slugify(text) {
      return String(text || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9\s-]/g, "")
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    // Safe getAsset — never throws, always returns a string or ""
    function safeAsset(getAsset, path) {
      if (!path) return "";
      try {
        var a = getAsset(path);
        if (!a) return "";
        // getAsset may return an object with toString, or a promise-like
        var s = a.toString();
        if (s && s.indexOf("[object") !== 0) return s;
        return "";
      } catch (e) {
        return "";
      }
    }

    var PostPreview = createClass({
      render: function () {
        try {
          var props = this.props;
          var entry = props.entry;
          var data = entry.get("data");
          if (!data) return h("div", {}, "Loading…");

          var title       = data.get("title") || "Untitled";
          var slug        = data.get("slug") || slugify(title);
          var isDraft     = data.get("draft") === true || String(data.get("draft")) === "true";
          var isBreaking  = data.get("breaking") === true || String(data.get("breaking")) === "true";
          var cats        = data.get("categories");
          var tags        = data.get("tags");
          var author      = data.get("author");
          var authors     = data.get("authors");
          // New posts use the "authors" relation (a list); old posts use "author" (string)
          if (!author && authors) {
            try {
              if (authors.toJS) { author = authors.toJS().join(", "); }
              else if (authors.join) { author = authors.join(", "); }
              else { author = String(authors); }
            } catch (e) { author = ""; }
          }
          var date        = data.get("date");
          var description = data.get("description");
          var thumbUrl    = safeAsset(props.getAsset, data.get("thumbnail"));

          var children = [];

          // Live slug
          children.push(
            h("div", { className: "au-pv-slug", key: "slug" },
              h("b", { key: "l" }, "URL slug:"),
              "/posts/" + slug + "/"
            )
          );

          // Badges
          var badges = [];
          if (isDraft)    badges.push(h("span", { className: "au-pv-badge au-pv-badge--draft", key: "d" }, "Draft"));
          if (isBreaking) badges.push(h("span", { className: "au-pv-badge au-pv-badge--breaking", key: "b" }, "Breaking"));
          if (cats && cats.forEach) {
            cats.forEach(function (c, i) {
              badges.push(h("span", { className: "au-pv-badge", key: "c" + i }, c));
            });
          }
          if (badges.length) children.push(h("div", { key: "badges" }, badges));

          // Title
          children.push(h("h1", { className: "au-pv-title", key: "title" }, title));

          // Meta
          var meta = [];
          if (author) meta.push(h("span", { key: "a" }, "By ", h("b", { key: "ab" }, author)));
          if (date)   meta.push(h("span", { key: "dt" }, String(date).slice(0, 10)));
          if (meta.length) children.push(h("div", { className: "au-pv-meta", key: "meta" }, meta));

          // Hero
          if (thumbUrl) {
            children.push(h("img", { className: "au-pv-hero", src: thumbUrl, key: "hero" }));
          } else {
            children.push(h("div", { className: "au-pv-hero--empty", key: "hero" }, "No thumbnail set"));
          }

          // Description
          if (description) {
            children.push(h("p", { key: "desc", style: { fontSize: "1.15rem", color: "#444", fontWeight: 500 } }, description));
          }

          // Body — isolated: if the markdown widget preview fails, keep the
          // rest of the preview (slug, title, etc.) instead of blanking out.
          var bodyEl;
          try {
            bodyEl = props.widgetFor("body");
          } catch (e) {
            bodyEl = null;
          }
          if (bodyEl) {
            children.push(h("div", { className: "au-pv-body", key: "body" }, bodyEl));
          } else {
            children.push(h("div", { className: "au-pv-body", key: "body", style: { color: "#999", fontStyle: "italic" } }, "Start writing to see the body preview…"));
          }

          // Tags
          if (tags && tags.size) {
            var tagEls = [];
            tags.forEach(function (t, i) {
              tagEls.push(h("span", { className: "au-pv-tag", key: "t" + i }, t));
            });
            children.push(h("div", { className: "au-pv-tags", key: "tags" }, tagEls));
          }

          return h("div", {}, children);
        } catch (err) {
          // Never let the preview go blank on error — show a message instead
          return h("div", { style: { padding: "20px", color: "#b91c1c" } },
            h("strong", {}, "Preview error: "), String(err && err.message ? err.message : err));
        }
      }
    });

    CMS.registerPreviewTemplate("posts_en", PostPreview);
    CMS.registerPreviewTemplate("posts_fr", PostPreview);
    CMS.registerPreviewTemplate("posts_rw", PostPreview);

    // ================================================================
    // AUTO-SLUG SAFETY NET (reliable, officially-supported approach)
    // On save, if the Slug field is empty, fill it from the title using
    // the same slugify rules the live preview shows. This guarantees a
    // correct slug is always written, whether or not the editor typed one.
    // ================================================================
    CMS.registerEventListener({
      name: "preSave",
      handler: function (props) {
        try {
          var data = props.entry.get("data");
          var current = data.get("slug");
          if (!current || String(current).trim() === "") {
            var auto = slugify(data.get("title"));
            if (auto) return data.set("slug", auto);
          }
        } catch (e) {}
        // No change → return nothing, Decap keeps existing data
      }
    });
  })();
  </script>
</body>
</html>
