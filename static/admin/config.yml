backend:
  name: git-gateway
  branch: main
  identity_url: https://africanupdates.netlify.app
  gateway_url: https://africanupdates.netlify.app/.netlify/git

# Force the CMS interface language to English
locale: "en"

# Show the preview pane
show_preview_links: true

# Global media fallback (used if collection doesn't override)
media_folder: static/images
public_folder: /images

# ─────────────────────────────────────────
# SHARED FIELD DEFINITIONS (referenced below as anchors)
# ─────────────────────────────────────────

# ─────────────────────────────────────────
# ENGLISH POSTS
# ─────────────────────────────────────────
collections:
  - name: posts_en
    label: "Posts (English)"
    folder: content/en/posts
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    # Images saved next to index.md inside the post bundle
    media_folder: ""
    public_folder: ""
    preview_path: "en/posts/{{slug}}"
    fields:
      - label: "Title"
        name: title
        widget: string

      - label: "Slug"
        name: slug
        widget: string
        required: false
        hint: "URL path for this post — auto-generated from the title above. Edit only if you need a custom URL."
        pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Lowercase letters, numbers and hyphens only"]

      - label: "Save as Draft"
        name: draft
        widget: boolean
        default: false
        required: false
        hint: "Turn ON to keep this post as an unpublished draft. Turn OFF to publish."

      - label: "Date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Description"
        name: description
        widget: string
        required: false
        hint: "Short summary shown in previews and SEO"

      - label: "Categories"
        name: categories
        widget: select
        multiple: true
        required: false
        options:
          - { label: "Featured (slider)", value: "featured" }
          - { label: "News", value: "news" }
          - { label: "Politics", value: "politics-news" }
          - { label: "Business", value: "business" }
          - { label: "Security", value: "security" }
          - { label: "Culture", value: "culture" }
          - { label: "Sport", value: "sport" }
          - { label: "Science & Tech", value: "tech" }
          - { label: "International", value: "international" }
          - { label: "Africa", value: "africa" }
          - { label: "Rwanda", value: "rwanda" }
          - { label: "East Africa", value: "east" }
          - { label: "World", value: "world" }
          - { label: "Health", value: "health" }
          - { label: "Entertainment", value: "entertainment" }

      - label: "Breaking News"
        name: breaking
        widget: boolean
        default: false
        required: false
        hint: "Show in the breaking news ticker at the top of the site"

      - label: "Tags"
        name: tags
        widget: list
        required: false
        hint: "Type a tag and press Enter"

      - label: "Authors"
        name: authors
        widget: relation
        collection: authors
        value_field: title
        search_fields: ["title"]
        display_fields: ["title"]
        multiple: true
        required: false
        hint: "Select one or more authors. Manage author profiles in the Authors section."

      - label: "Thumbnail"
        name: thumbnail
        widget: image
        required: false
        hint: "Main image for this post. Saved inside the post folder."
        media_folder: ""
        public_folder: ""

      - label: "Body"
        name: body
        widget: markdown

# ─────────────────────────────────────────
# FRENCH POSTS
# ─────────────────────────────────────────
  - name: posts_fr
    label: "Posts (Français)"
    folder: content/fr/posts
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    preview_path: "fr/posts/{{slug}}"
    fields:
      - label: "Titre"
        name: title
        widget: string

      - label: "Slug"
        name: slug
        widget: string
        required: false
        hint: "Chemin URL — généré automatiquement depuis le titre. Ne modifier que si vous voulez une URL personnalisée."
        pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Minuscules, chiffres et tirets uniquement"]

      - label: "Enregistrer comme brouillon"
        name: draft
        widget: boolean
        default: false
        required: false
        hint: "Activez pour garder l'article comme brouillon non publié. Désactivez pour publier."

      - label: "Date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Description"
        name: description
        widget: string
        required: false
        hint: "Résumé court affiché dans les aperçus"

      - label: "Catégories"
        name: categories
        widget: select
        multiple: true
        required: false
        options:
          - { label: "À la une (slider)", value: "featured" }
          - { label: "Actualités", value: "news" }
          - { label: "Politique", value: "politics-news" }
          - { label: "Business", value: "business" }
          - { label: "Sécurité", value: "security" }
          - { label: "Culture", value: "culture" }
          - { label: "Sport", value: "sport" }
          - { label: "Sciences & Tech", value: "tech" }
          - { label: "International", value: "international" }
          - { label: "Afrique", value: "africa" }
          - { label: "Rwanda", value: "rwanda" }
          - { label: "Afrique de l'Est", value: "east" }
          - { label: "Monde", value: "world" }
          - { label: "Santé", value: "health" }
          - { label: "Divertissement", value: "entertainment" }

      - label: "Flash info"
        name: breaking
        widget: boolean
        default: false
        required: false
        hint: "Afficher dans le bandeau d'actualités en haut du site"

      - label: "Tags"
        name: tags
        widget: list
        required: false
        hint: "Écrivez un tag et appuyez sur Entrée"

      - label: "Authors"
        name: authors
        widget: relation
        collection: authors
        value_field: title
        search_fields: ["title"]
        display_fields: ["title"]
        multiple: true
        required: false
        hint: "Select one or more authors. Manage author profiles in the Authors section."

      - label: "Miniature"
        name: thumbnail
        widget: image
        required: false
        hint: "Image principale. Enregistrée dans le dossier de l'article."
        media_folder: ""
        public_folder: ""

      - label: "Contenu"
        name: body
        widget: markdown

# ─────────────────────────────────────────
# KINYARWANDA POSTS
# ─────────────────────────────────────────
  - name: posts_rw
    label: "Inyandiko (Kinyarwanda)"
    folder: content/rw/posts
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    preview_path: "posts/{{slug}}"
    fields:
      - label: "Umutwe"
        name: title
        widget: string

      - label: "Slug"
        name: slug
        widget: string
        required: false
        hint: "Aderesi y'inyandiko — igenerwa bivuye ku mutwe. Hindura gusa niba ushaka aderesi yihariye."
        pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Inyuguti nto, imibare na '-' gusa"]

      - label: "Bika nk'Igihishwe (Draft)"
        name: draft
        widget: boolean
        default: false
        required: false
        hint: "Funga niba ushaka kubika inyandiko itarasohoka. Fungura kugira ngo uyisohore."

      - label: "Itariki"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Incamake"
        name: description
        widget: string
        required: false
        hint: "Incamake igaragara mu bisobanuro"

      - label: "Ibyiciro"
        name: categories
        widget: select
        multiple: true
        required: false
        options:
          - { label: "Ibyiburure (slider)", value: "featured" }
          - { label: "Amakuru", value: "news" }
          - { label: "Politiki", value: "politics-news" }
          - { label: "Ubucuruzi", value: "business" }
          - { label: "Umutekano", value: "security" }
          - { label: "Umuco", value: "culture" }
          - { label: "Siporo", value: "sport" }
          - { label: "Siyansi & Ikoranabuhanga", value: "tech" }
          - { label: "Mpuzamahanga", value: "international" }
          - { label: "Afurika", value: "africa" }
          - { label: "Rwanda", value: "rwanda" }
          - { label: "Afurika y'Uburasirazuba", value: "east" }
          - { label: "Isi Yose", value: "world" }
          - { label: "Ubuzima", value: "health" }
          - { label: "Amakino", value: "entertainment" }

      - label: "Amakuru Ashya Cyane"
        name: breaking
        widget: boolean
        default: false
        required: false
        hint: "Erekana muri ticker yo hejuru ya site"

      - label: "Tags"
        name: tags
        widget: list
        required: false
        hint: "Andika tag hanyuma ukande Enter"

      - label: "Authors"
        name: authors
        widget: relation
        collection: authors
        value_field: title
        search_fields: ["title"]
        display_fields: ["title"]
        multiple: true
        required: false
        hint: "Select one or more authors. Manage author profiles in the Authors section."

      - label: "Ifoto"
        name: thumbnail
        widget: image
        required: false
        hint: "Ifoto nkuru y'inyandiko. Ibikwa mu bubiko bw'inyandiko."
        media_folder: ""
        public_folder: ""

      - label: "Ubutumwa"
        name: body
        widget: markdown

  # ─────────────────────────────────────────
  # AUTHORS — profiles for bylines & author pages
  # Each author becomes a page at /authors/<name>/
  # ─────────────────────────────────────────
  - name: authors
    label: "Authors"
    label_singular: "Author"
    folder: content/authors
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/_index"
    identifier_field: title
    media_folder: ""
    public_folder: ""
    summary: "{{title}} — {{role}}"
    fields:
      - label: "Name"
        name: title
        widget: string
        hint: "The author's full name, exactly as it should appear on bylines."

      - label: "Role / Title"
        name: role
        widget: string
        required: false
        hint: "e.g. Political Correspondent, Business Reporter"

      - label: "Photo"
        name: avatar
        widget: image
        required: false
        hint: "Headshot for the author page. Saved inside the author's folder."
        media_folder: ""
        public_folder: ""

      - label: "Email"
        name: email
        widget: string
        required: false
        hint: "Optional — shown as a contact icon on the author page."

      - label: "X (Twitter) URL"
        name: twitter
        widget: string
        required: false
        hint: "Optional — full URL, e.g. https://x.com/handle"

      - label: "LinkedIn URL"
        name: linkedin
        widget: string
        required: false
        hint: "Optional — full URL"

      - label: "Biography"
        name: body
        widget: markdown
        hint: "2–3 sentences about the author, their experience and credentials. Shown on their page and important for Google News."
