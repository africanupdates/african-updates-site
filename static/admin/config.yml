  # ─────────────────────────────────────────
  # AUTHORS — profiles for bylines & author pages
  # Each author becomes a page at /authors/<name>/
  # ─────────────────────────────────────────
  - name: authors
    label: "Authors"
    label_singular: "Author"
    folder: content/authors
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/_index"
    identifier_field: title
    media_folder: ""
    public_folder: ""
    summary: "{{title}} — {{role}}"
    fields:
      - label: "Title"
        name: title
        widget: string
        hint: "The author's full name, exactly as it should appear on bylines."

      - label: "Role / Title"
        name: role
        widget: string
        required: false
        hint: "e.g. Political Correspondent, Business Reporter"

      - label: "Photo"
        name: avatar
        widget: image
        required: false
        hint: "Headshot for the author page. Saved inside the author's folder."
        media_folder: ""
        public_folder: ""

      - label: "Email"
        name: email
        widget: string
        required: false
        hint: "Optional — shown as a contact icon on the author page."

      - label: "X (Twitter) URL"
        name: twitter
        widget: string
        required: false
        hint: "Optional — full URL, e.g. https://x.com/handle"

      - label: "LinkedIn URL"
        name: linkedin
        widget: string
        required: false
        hint: "Optional — full URL"

      - label: "Body"
        name: body
        widget: markdown
        hint: "2–3 sentences about the author, their experience and credentials. Shown on their page and important for Google News."

  # ─────────────────────────────────────────
  # ADVERTS — top pane + footer column
  # Stored in data/adverts.yml, shown site-wide in all languages
  # ─────────────────────────────────────────
  - name: adverts
    label: "Adverts"
    files:
      - name: adverts
        label: "Adverts"
        file: data/adverts.yml
        media_folder: "/static/images/adverts"
        public_folder: "/images/adverts"
        fields:
          - label: "Top pane (between top bar and menu)"
            name: top
            widget: list
            required: false
            label_singular: "Advert"
            summary: "{{fields.title}}"
            collapsed: false
            allow_add: true
            allow_remove: true
            allow_reorder: true
            fields:
              - { label: "Image", name: image, widget: image, hint: "Wide banner works best. Two adverts show side by side." }
              - { label: "Link", name: link, widget: string, required: false, hint: "Optional. Full URL, e.g. https://example.com — the advert becomes clickable." }
              - { label: "Title", name: title, widget: string, required: false, hint: "Describes the advert for screen readers." }
              - { label: "Active", name: active, widget: boolean, default: true, hint: "Turn OFF to hide without deleting." }
