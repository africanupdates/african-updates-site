## ============================================================
## African Updates — hugo.toml
## Hugo v0.159.2 extended + Custom theme (no Mainroad dependency)
## ============================================================

baseURL = "https://africanupdates.com/"
title   = "African Updates"
enableRobotsTXT = true

## Remove Mainroad — using our custom layouts now
## theme = "mainroad"   ← delete or comment out this line

defaultContentLanguage     = "rw"
defaultContentLanguageInSubdir = true   # rw at /rw/, en at /en/, fr at /fr/ — all symmetric

## ── GOOGLE ANALYTICS (GA4) ──────────────────────────────────
## Paste your Measurement ID (looks like G-XXXXXXXXXX) below.
## Leave the quotes empty ("") to disable analytics entirely.
[services.googleAnalytics]
  ID = "G-5ETFKGB3PY"

## Pagination
paginate     = 12          # posts per archive page
paginatePath = "page"      # /category/politics/page/2/

## Summaries
summaryLength = 40         # words used by .Summary

## Syntax highlighting (for code blocks in posts)
[markup.highlight]
  style          = "monokai"
  lineNos        = false
  guessSyntax    = true
  noClasses      = true

## Allow raw HTML in markdown (needed for embedded content)
[markup.goldmark.renderer]
  unsafe = true

## Suppress known warnings
ignoreLogs = ['warning-goldmark-raw-html']

## Table of contents
[markup.tableOfContents]
  startLevel = 2
  endLevel   = 3

## ── LANGUAGES ───────────────────────────────────────────────
[languages]

  [languages.rw]
    languageName = "Kinyarwanda"
    weight       = 1
    contentDir   = "content/rw"
    [languages.rw.params]
      description = "Amakuru y'Afurika mu Ntoki Zawe"

  [languages.en]
    languageName = "English"
    weight       = 2
    contentDir   = "content/en"
    [languages.en.params]
      description = "African news across politics, business, culture, and sport"

  [languages.fr]
    languageName = "French"
    weight       = 3
    contentDir   = "content/fr"
    [languages.fr.params]
      description = "L'actualité africaine en politique, économie, culture et sport"

## ── SITE PARAMS ─────────────────────────────────────────────
[params]
  description = "African Updates — News in Your Hand"
  logo        = "images/logo.png"          # header + footer display
  ogImage     = "images/og-default.png"    # social share fallback — 1200×630 PNG banner
  tagline     = "News in Your Hand"
  footerAbout = "African Updates delivers independent journalism across Kinyarwanda, English, and French — keeping the continent informed."
  custom_css  = ["css/gallery.css"]

  ## Publisher identity — used by the NewsMediaOrganization structured data
  email        = "info@africanupdates.com"
  foundingYear = "2024"                     # adjust to the real founding year if different

  ## Social links
  [params.social]
    twitter   = "https://x.com/africanupdates1"
    whatsapp  = "https://whatsapp.com/channel/0029VafqKm311ulSPJHML00o"
    youtube   = "https://www.youtube.com/@denysembabazi"
    facebook  = ""     # add when ready
    instagram = ""     # add when ready

  ## Homepage category blocks — controls which sections appear and in what order.
  ## name  = exact category string as used in post frontmatter
  ## slug  = URL slug (defaults to urlized name if omitted)
  ## icon  = Font Awesome class
  ## limit = posts shown in the block

  [[params.homeCategories]]
    name  = "Politics"
    slug  = "politics-news"
    icon  = "fa-landmark"
    limit = 5

  [[params.homeCategories]]
    name  = "Business"
    slug  = "business"
    icon  = "fa-chart-line"
    limit = 5

  [[params.homeCategories]]
    name  = "Security"
    slug  = "security"
    icon  = "fa-shield-halved"
    limit = 5

  [[params.homeCategories]]
    name  = "Culture"
    slug  = "culture"
    icon  = "fa-masks-theater"
    limit = 5

  [[params.homeCategories]]
    name  = "Sport"
    slug  = "sport"
    icon  = "fa-futbol"
    limit = 5

  [[params.homeCategories]]
    name  = "Science & Tech"
    slug  = "tech"
    icon  = "fa-microchip"
    limit = 5

## ── RELATED CONTENT ─────────────────────────────────────────
[related]
  includeNewer = true
  threshold    = 80
  toLower      = false

  [[related.indices]]
    name   = "categories"
    weight = 100

  [[related.indices]]
    name   = "tags"
    weight = 80

  [[related.indices]]
    name   = "date"
    weight = 10

## ── OUTPUT FORMATS ──────────────────────────────────────────
## ── OUTPUT FORMATS ──────────────────────────────────────────
[outputs]
  home    = ["HTML", "RSS", "NewsSitemap"]
  section = ["HTML", "RSS"]
  term    = ["HTML", "RSS"]

## Custom output format: Google News sitemap (served at /news-sitemap.xml)
[outputFormats.NewsSitemap]
  mediaType   = "application/xml"
  baseName    = "news-sitemap"
  isPlainText = true
  rel         = "sitemap"

## ── TAXONOMIES ──────────────────────────────────────────────
[taxonomies]
  category = "categories"
  tag      = "tags"
  author   = "authors"

