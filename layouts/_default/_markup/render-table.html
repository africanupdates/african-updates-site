{{- /*
  render-table.html — wraps every markdown table in a horizontally
  scrollable container so wide tables don't break the mobile layout.
*/ -}}
<div class="au-table-wrap">
  <table>
    <thead>
      {{- range .THead }}
      <tr>
        {{- range . }}
        <th{{ with .Alignment }} style="text-align: {{ . }}"{{ end }}>{{ .Text }}</th>
        {{- end }}
      </tr>
      {{- end }}
    </thead>
    <tbody>
      {{- range .TBody }}
      <tr>
        {{- range . }}
        <td{{ with .Alignment }} style="text-align: {{ . }}"{{ end }}>{{ .Text }}</td>
        {{- end }}
      </tr>
      {{- end }}
    </tbody>
  </table>
</div>
