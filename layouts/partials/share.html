{{- /* share.html — social share bar */}}
{{ $url   := .Permalink | safeURL }}
{{ $title := .Title | safeURL }}

<div class="au-share">
  <span class="au-share__label">{{ i18n "share" | default "Share" }}:</span>

  <a class="au-share__btn au-share__btn--facebook"
     href="https://www.facebook.com/sharer/sharer.php?u={{ $url }}"
     target="_blank" rel="noopener noreferrer"
     aria-label="Share on Facebook">
    <i class="fa-brands fa-facebook-f"></i>
    <span>Facebook</span>
  </a>

  <a class="au-share__btn au-share__btn--twitter"
     href="https://twitter.com/intent/tweet?url={{ $url }}&text={{ $title }}"
     target="_blank" rel="noopener noreferrer"
     aria-label="Share on X / Twitter">
    <i class="fa-brands fa-x-twitter"></i>
    <span>Twitter</span>
  </a>

  <a class="au-share__btn au-share__btn--whatsapp"
     href="https://api.whatsapp.com/send?text={{ $title }}%20{{ $url }}"
     target="_blank" rel="noopener noreferrer"
     aria-label="Share on WhatsApp">
    <i class="fa-brands fa-whatsapp"></i>
    <span>WhatsApp</span>
  </a>

  <a class="au-share__btn au-share__btn--linkedin"
     href="https://www.linkedin.com/shareArticle?mini=true&url={{ $url }}&title={{ $title }}"
     target="_blank" rel="noopener noreferrer"
     aria-label="Share on LinkedIn">
    <i class="fa-brands fa-linkedin-in"></i>
    <span>LinkedIn</span>
  </a>

  <button class="au-share__btn au-share__btn--copy"
          data-copy-url="{{ .Permalink }}"
          aria-label="Copy link">
    <i class="fa fa-link"></i>
    <span>Copy</span>
  </button>
</div>
